      }

        border: 1px solid #dbe3ef;
        border-radius: 22px;

        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
        color: #687386;
        font-weight: 700;
      }

        height: 10px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
        margin: 14px 0 22px;
      }
      .progress span {
        display: block;
        height: 100%;
        background: #2563eb;
        width: 0%;
        transition: 0.25s;
      }
      .q {
        font-size: 21px;
        line-height: 1.38;
        font-weight: 800;
        margin: 8px 0 18px;
      }
      .answers {
        display: grid;
        gap: 12px;
      }
      .answer {
        width: 100%;
        text-align: left;
        border: 2px solid #e5e7eb;
        background: #fff;
        border-radius: 15px;
        padding: 14px 16px;
        font-size: 17px;
        line-height: 1.35;
        cursor: pointer;
        transition: 0.15s;
      }
      .answer:hover {
        border-color: #93c5fd;
        background: #eff6ff;
      }
      .answer.correct {
        border-color: #16a34a;
        background: #dcfce7;
      }
      .answer.wrong {
        border-color: #dc2626;
        background: #fee2e2;
      }
      .answer:disabled {
        cursor: default;
      }
      .feedback {
        display: none;
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 14px;
        font-weight: 800;
      }
      .feedback.ok {
        display: block;
        background: #dcfce7;
        color: #166534;
      }
      .feedback.bad {
        display: block;
        background: #fee2e2;
        color: #991b1b;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 800;
        cursor: pointer;
        background: #2563eb;
        color: white;
      }

        background: #e5e7eb;
        color: #111827;
      }

        opacity: 0.45;
        cursor: not-allowed;

        grid-template-columns: repeat(3, 1fr);

        margin-top: 18px;

        border-radius: 14px;
        padding: 12px;
        text-align: center;

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tabPanel_' + btn.dataset.target).classList.add('active');
      });
    });

    /* ======================= SILNIK QUIZU (generyczny, parametryzowany sufiksem) ======================= */
    function startQuiz(suffix, originalQuestions) {
      let questions = originalQuestions.map((q) => ({ ...q })),
        current = 0,
        selected = Array(questions.length).fill(null),
        favorites = [],
        correctCount = 0,
        wrongCount = 0;

      const el = (id) => document.getElementById(id + suffix);

      el("totalCount").textContent = questions.length;

      function escapeHtml(s) {
        return String(s).replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;",
            })[m],
        );
      }

      function render() {
        const q = questions[current];
        el("favBtn").textContent = favorites.includes(q.orig)
          ? "⭐ Usuń z ulubionych"
          : "☆ Dodaj do ulubionych";
        el("counter").textContent = `Pytanie ${current + 1} / ${questions.length}`;
        el("scoreBox").textContent = `Wynik: ${correctCount} dobrych, ${wrongCount} złych`;
        el("bar").style.width = `${((current + 1) / questions.length) * 100}%`;
        el("question").innerHTML = q.question
          .replace(/: a\)/g, ":<br><br>a)")
          .replace(/\. b\)/g, ".<br>b)")
          .replace(/\. c\)/g, ".<br>c)")
          .replace(/\. d\)/g, ".<br>d)");
        el("answers").innerHTML = "";
        el("feedback").className = "feedback";
        el("feedback").textContent = "";
        q.answers.forEach((ans, i) => {
          const btn = document.createElement("button");
          btn.className = "answer";
          btn.innerHTML = `<b>${String.fromCharCode(65 + i)}.</b> ${escapeHtml(ans)}`;
          btn.onclick = () => choose(i);
          if (selected[current] !== null) {
            btn.disabled = true;
            if (i === q.correct) btn.classList.add("correct");
            if (i === selected[current] && i !== q.correct) btn.classList.add("wrong");
          }
          el("answers").appendChild(btn);
        });
        if (selected[current] !== null) showFeedback(selected[current] === q.correct);
        el("prevBtn").disabled = current === 0;
        el("nextBtn").textContent = current === questions.length - 1 ? "Koniec" : "Następne";
        updateStats();
      }

      function choose(i) {
        if (selected[current] !== null) return;
        selected[current] = i;
        if (i === questions[current].correct) correctCount++;
        else wrongCount++;
        render();
      }

      function showFeedback(ok) {
        const f = el("feedback");
        f.className = "feedback " + (ok ? "ok" : "bad");
        f.textContent = ok ? "✅ Dobra odpowiedź!" : "❌ Zła odpowiedź!";
      }

      function updateStats() {
        el("good").textContent = correctCount;
        el("bad").textContent = wrongCount;
        const done = correctCount + wrongCount;
        el("percent").textContent = done ? Math.round((correctCount / done) * 100) + "%" : "0%";
      }

      el("favBtn").onclick = () => {
        if (favorites.includes(questions[current].orig)) {
          favorites = favorites.filter((i) => i !== questions[current].orig);
        } else {
          favorites.push(questions[current].orig);
        }
        render();
      };

      el("showFavBtn").onclick = () => {
        if (favorites.length === 0) {
          alert("Nie masz jeszcze ulubionych pytań.");
          return;
        }
        questions = originalQuestions.filter((q) => favorites.includes(q.orig)).map((q) => ({ ...q }));
        selected = Array(questions.length).fill(null);
        current = 0;
        correctCount = 0;
        wrongCount = 0;
        el("totalCount").textContent = questions.length;
        render();
      };

      el("showAllBtn").onclick = () => {
        questions = originalQuestions.map((q) => ({ ...q }));
        selected = Array(questions.length).fill(null);
        current = 0;
        correctCount = 0;
        wrongCount = 0;
        el("totalCount").textContent = questions.length;
        render();
      };

      el("nextBtn").onclick = () => {
        if (current < questions.length - 1) {
          current++;
          render();
        } else {
          alert(`Koniec gry! Wynik: ${correctCount}/${questions.length}`);
        }
      };

      el("prevBtn").onclick = () => {
        if (current > 0) {
          current--;
          render();
        }
      };

      el("restartBtn").onclick = () => {
        selected = Array(questions.length).fill(null);
        correctCount = 0;
        wrongCount = 0;
        current = 0;
        render();
      };

      el("shuffleBtn").onclick = () => {
        for (let i = questions.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questions[i], questions[j]] = [questions[j], questions[i]];
        }
        selected = Array(questions.length).fill(null);
        correctCount = 0;
        wrongCount = 0;
        current = 0;
        render();
      };

      el("gotoBtn").onclick = () => {
        const nr = parseInt(el("gotoQuestion").value);
        if (!isNaN(nr) && nr >= 1 && nr <= questions.length) {
          current = nr - 1;
          render();
        } else {
          alert("Podaj numer od 1 do " + questions.length);
        }
      };

      el("gotoQuestion").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          el("gotoBtn").click();
        }
      });

      render();
    }

    startQuiz("_a", questionsZeZdjec);
    startQuiz("_b", questionsPozostale);
    </script>
